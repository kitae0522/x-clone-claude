name: "🔧 인프라 개선"
description: "백엔드/프론트엔드 인프라 개선 작업을 제안합니다."
labels: "🔧 인프라"
body:
  - type: textarea
    attributes:
      label: 🔧 개요
      description: 인프라 개선 작업의 목적과 배경을 설명해 주세요.
      placeholder:
    validations:
      required: true
  - type: dropdown
    attributes:
      label: 📦 영역
      description: 어떤 영역의 인프라 개선인가요?
      options:
        - Backend
        - Frontend
        - DevOps/CI
        - Database
        - 기타
    validations:
      required: true
  - type: textarea
    attributes:
      label: 📋 현재 상태 (As-Is)
      description: 현재 어떤 방식으로 동작하고 있는지, 문제점은 무엇인지 작성해 주세요.
      placeholder:
    validations:
      required: true
  - type: textarea
    attributes:
      label: 🎯 목표 상태 (To-Be)
      description: 개선 후 어떤 상태가 되어야 하는지 작성해 주세요.
      placeholder:
    validations:
      required: true
  - type: textarea
    attributes:
      label: 🔨 해야 할 일
      description: 구체적인 작업 목록을 체크리스트로 작성해 주세요.
      placeholder: |
        - [ ] 라이브러리 선정
        - [ ] 코드 구현
        - [ ] 테스트 작성
        - [ ] 기존 코드 마이그레이션
    validations:
      required: true
  - type: textarea
    attributes:
      label: 📚 선택한 라이브러리/도구
      description: 도입할 라이브러리나 도구가 있다면 이름, 선택 이유를 작성해 주세요.
      placeholder: |
        | 라이브러리 | 용도 | 선택 이유 |
        |-----------|------|----------|
    validations:
      required: false
  - type: textarea
    attributes:
      label: ⚠️ 변경 영향도
      description: 이 변경이 기존 코드에 미치는 영향과 주의사항을 작성해 주세요.
      placeholder:
    validations:
      required: false
  - type: textarea
    attributes:
      label: 🙋🏻 덧붙일 말
      description: 더 하고 싶은 말이 있다면 작성해 주세요!
    validations:
      required: false
